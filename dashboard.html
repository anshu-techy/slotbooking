<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Slot Booking</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">SlotBook</a>
    <div class="nav-links">
      <span class="user-name" id="nav-user"></span>
      <a href="book-slot.html" class="btn btn-primary">Book Slot</a>
      <a href="my-bookings.html">My Bookings</a>
      <a href="admin.html" id="admin-link" class="hidden">Admin</a>
      <a href="#" id="logout-btn">Logout</a>
    </div>
  </nav>

  <main class="dashboard-page">
    <div class="dashboard-card profile-card">
      <h2>Profile</h2>
      <div class="profile-info">
        <p><strong>Name:</strong> <span id="profile-name"></span></p>
        <p><strong>Email:</strong> <span id="profile-email"></span></p>
        <p><strong>Phone:</strong> <span id="profile-phone"></span></p>
      </div>
    </div>
    <div class="dashboard-actions">
      <a href="book-slot.html" class="action-card">
        <span class="action-icon">&#128197;</span>
        <h3>Book Slot</h3>
        <p>Select date, time and requirement</p>
      </a>
      <a href="my-bookings.html" class="action-card">
        <span class="action-icon">&#128203;</span>
        <h3>My Bookings</h3>
        <p>View and cancel your slots</p>
      </a>
    </div>
    <div id="dashboard-message" class="message"></div>
  </main>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
