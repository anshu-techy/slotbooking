<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Slot Booking</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">SlotBook</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p class="auth-sub">Sign up with your details</p>
      <form id="signup-form" class="auth-form">
        <input type="text" id="signup-name" placeholder="Full Name" required />
        <input type="email" id="signup-email" placeholder="Email" required />
        <input type="password" id="signup-password" placeholder="Password (min 6)" required minlength="6" />
        <input type="tel" id="signup-phone" placeholder="Phone Number" required />
        <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
      </form>
      <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
      <div id="signup-message" class="message"></div>
    </div>
  </main>
  <script src="js/app.js"></script>
  <script src="js/signup.js"></script>
</body>
</html>
