<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Slot Booking</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">SlotBook</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="signup.html">Sign Up</a>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p class="auth-sub">Choose how you want to sign in</p>

      <ul class="login-tabs">
        <li><a href="#" class="active" data-tab="email">Email</a></li>
        <li><a href="#" data-tab="otp">OTP</a></li>
      </ul>

      <div id="login-email" class="login-panel">
        <form id="login-form" class="auth-form">
          <input type="email" id="login-email-input" placeholder="Email" required />
          <input type="password" id="login-password" placeholder="Password" required />
          <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>
      </div>

      <div id="login-otp" class="login-panel hidden">
        <form id="otp-request-form" class="auth-form">
          <input type="tel" id="otp-phone" placeholder="Phone Number" required />
          <button type="submit" class="btn btn-primary btn-block">Send OTP</button>
        </form>
        <form id="otp-verify-form" class="auth-form hidden">
          <input type="text" id="otp-code" placeholder="Enter 6-digit OTP" maxlength="6" />
          <button type="submit" class="btn btn-primary btn-block">Verify OTP</button>
        </form>
        <p id="otp-dev-hint" class="dev-hint hidden"></p>
      </div>

      <div class="divider">or</div>
      <button type="button" id="google-login-btn" class="btn btn-google btn-block">Continue with Google</button>

      <p class="auth-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
      <div id="login-message" class="message"></div>
    </div>
  </main>
  <script src="js/app.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
